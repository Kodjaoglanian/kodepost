services:
  # ─── Produção ────────────────────────────────────────────────────────────────
  kodepost:
    build: .
    container_name: kodepost
    ports:
      - "8765:8765"
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    healthcheck:
      test: ["CMD", "/kodepost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # ─── Desenvolvimento (opcional) ──────────────────────────────────────────────
  # docker compose up --build kodepost-dev
  kodepost-dev:
    build: .
    container_name: kodepost-dev
    ports:
      - "3000:8765"
    volumes:
      - ./posts:/app/posts:ro
      - ./templates:/app/templates:ro
      - ./assets:/app/assets:ro
    command: ["serve", "-port", "8765"]
    profiles:
      - dev
