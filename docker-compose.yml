services:
  # ─── Produção ────────────────────────────────────────────────────────────────
  kodepost:
    build: .
    container_name: kodepost
    expose:
      - "8765"
    networks:
      - kodepost-net
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    healthcheck:
      test: ["CMD", "/kodepost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # ─── Caddy (proxy reverso + SSL automático) ─────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    networks:
      - kodepost-net
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  # ─── Desenvolvimento (opcional) ──────────────────────────────────────────────
  kodepost-dev:
    build: .
    container_name: kodepost-dev
    ports:
      - "3000:8765"
    volumes:
      - ./posts:/app/posts:ro
      - ./templates:/app/templates:ro
      - ./assets:/app/assets:ro
    command: ["serve", "-port", "8765"]
    profiles:
      - dev

networks:
  kodepost-net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
